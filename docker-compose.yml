services:
  redis:
    image: redis:7-alpine
    container_name: alpacai-redis
    restart: no
    ports:
      - "63795:6379"
    volumes:
      - redis_data:/data
    environment:
      - TZ=Europe/Rome
      - PUID=1000
      - PGID=1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: alpacai
    pull_policy: build
    restart: no
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Rome
      - HOME=/app/data
    user: "${PUID:-1000}:${PGID:-1000}"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src   # for development hot-reload (optional)
      - ./data:/app/data

volumes:
  redis_data:

